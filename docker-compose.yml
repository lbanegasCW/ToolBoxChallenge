services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - '3001:3001'

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    environment:
      REACT_APP_API_BASE_URL: http://api:3001
      HOST: 0.0.0.0
    depends_on:
      - api
    ports:
      - '3000:3000'
