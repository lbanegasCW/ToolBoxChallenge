services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - ./api/.env
    ports:
      - '3001:3001'

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    env_file:
      - ./client/.env
    environment:
      REACT_APP_API_BASE_URL: http://localhost:3001
    depends_on:
      - api
    ports:
      - '3000:3000'
